<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>chobitfile: JS vs MoonBit WASM</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f1419;
        --card: #1a2332;
        --text: #e7ecf3;
        --muted: #8b9bb4;
        --accent: #5b9fd4;
        --ok: #3dbe7a;
        --warn: #e0a24a;
        --bad: #e05a5a;
        font-family:
          "IBM Plex Sans",
          "Hiragino Sans",
          system-ui,
          sans-serif;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f4f6f9;
          --card: #fff;
          --text: #1a2332;
          --muted: #5a6a80;
        }
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
      }
      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 2rem 1.25rem 4rem;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 650;
        margin: 0 0 0.25rem;
      }
      .sub {
        color: var(--muted);
        margin-bottom: 1.5rem;
      }
      .card {
        background: var(--card);
        border-radius: 12px;
        padding: 1.25rem;
        margin-bottom: 1rem;
        box-shadow: 0 1px 0 rgba(0, 0, 0, 0.06);
      }
      label {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        margin-right: 1rem;
        font-size: 0.95rem;
      }
      button {
        background: var(--accent);
        color: #fff;
        border: 0;
        border-radius: 8px;
        padding: 0.6rem 1.1rem;
        font-weight: 600;
        cursor: pointer;
        font-size: 0.95rem;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      #status {
        margin-top: 0.75rem;
        color: var(--muted);
        font-size: 0.9rem;
        min-height: 1.4em;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.9rem;
      }
      th,
      td {
        text-align: left;
        padding: 0.5rem 0.4rem;
        border-bottom: 1px solid color-mix(in srgb, var(--muted) 30%, transparent);
      }
      th {
        color: var(--muted);
        font-weight: 600;
      }
      td.num {
        font-variant-numeric: tabular-nums;
        text-align: right;
      }
      .winner-wasm {
        color: var(--ok);
        font-weight: 600;
      }
      .winner-js {
        color: var(--warn);
        font-weight: 600;
      }
      .winner-tie {
        color: var(--muted);
      }
      pre {
        overflow: auto;
        font-size: 0.8rem;
        background: color-mix(in srgb, var(--bg) 70%, var(--card));
        padding: 0.75rem;
        border-radius: 8px;
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>chobitfile ベンチマーク</h1>
      <p class="sub">
        ブラウザ上で JS と MoonBit (wasm-gc) の生成系処理を比較します。メインスレッドで実行するため、実行中は UI が固まることがあります。
      </p>

      <div class="card">
        <div class="row">
          <strong>サイズ:</strong>
          <label><input type="checkbox" name="size" value="1048576" checked /> 1MB</label>
          <label><input type="checkbox" name="size" value="10485760" checked /> 10MB</label>
          <label><input type="checkbox" name="size" value="104857600" /> 100MB</label>
        </div>
        <div class="row" style="margin-top: 0.75rem">
          <label>warmup <input id="warmup" type="number" min="0" value="1" style="width: 3.5rem" /></label>
          <label>iterations <input id="iters" type="number" min="1" value="3" style="width: 3.5rem" /></label>
          <button id="run">ベンチ実行</button>
        </div>
        <div id="status">WASM を読み込み中…</div>
      </div>

      <div class="card">
        <h2 style="font-size: 1.1rem; margin-top: 0">結果</h2>
        <div id="table-wrap"><p class="sub">未実行</p></div>
      </div>

      <div class="card">
        <h2 style="font-size: 1.1rem; margin-top: 0">Markdown</h2>
        <pre id="md">（実行後に表示）</pre>
      </div>
    </main>
    <script type="module" src="./browser-main.mjs"></script>
  </body>
</html>
